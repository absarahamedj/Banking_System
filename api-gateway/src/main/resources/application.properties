
spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Account Service
spring.cloud.gateway.server.webmvc.routes[1].id=account-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/accounts/**

# Transaction Service
spring.cloud.gateway.server.webmvc.routes[2].id=transaction-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/transactions/**
